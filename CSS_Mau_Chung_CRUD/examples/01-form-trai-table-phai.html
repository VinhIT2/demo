<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mẫu form trái, bảng phải</title>
  <link rel="stylesheet" href="../css/exam-crud.css">
</head>
<body>
  <div class="app-shell theme-blue">
    <header class="app-header primary">
      <div>
        <h1 class="page-title">Quản lý sản phẩm</h1>
        <p class="page-subtitle">Giao diện nhập liệu và hiển thị danh sách</p>
      </div>
    </header>

    <main class="main-grid layout-two">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Thêm sản phẩm mới</h2>
          <p class="panel-desc">Nhập đầy đủ thông tin</p>
        </div>

        <form class="crud-form">
          <div class="form-group">
            <label>Tên sản phẩm</label>
            <input class="form-control" placeholder="Nhập tên sản phẩm">
          </div>

          <div class="form-group">
            <label>Danh mục</label>
            <select class="form-control">
              <option>Điện thoại</option>
              <option>Laptop</option>
            </select>
          </div>

          <div class="form-group">
            <label>Giá</label>
            <input class="form-control" placeholder="Nhập giá">
          </div>

          <div class="form-actions">
            <button class="btn btn-primary btn-block" type="button">Thêm sản phẩm</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Danh sách sản phẩm</h2>
          <p class="panel-desc">Bảng dữ liệu mẫu</p>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Tên</th>
                <th>Danh mục</th>
                <th>Giá</th>
                <th>Trạng thái</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>iPhone 15</td>
                <td>Điện thoại</td>
                <td>24.990.000 đ</td>
                <td><span class="status-badge success">Còn hàng</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
